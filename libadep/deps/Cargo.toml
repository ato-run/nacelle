[package]
name = "libadep-deps"
version = "0.1.0"
edition = "2021"
license = "FSL-1.1-ALv2"

[features]
default = ["std", "tokio-runtime"]
std = []
tokio-runtime = []

[lib]
name = "libadep_deps"
path = "src/lib.rs"

[[bin]]
name = "depsd"
path = "src/bin/depsd.rs"

[dependencies]
libadep-cas = { path = "../cas" }
libadep-observability = { path = "../observability" }
libadep-core = { path = "../core" }
anyhow = "1.0"
dirs = "5.0"
prost = "0.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.38", features = ["rt-multi-thread", "macros", "fs", "process", "signal", "net"] }
tonic = { version = "0.11", features = ["transport"] }
tracing = "0.1"
tokio-stream = { version = "0.1", features = ["net"] }
tower = "0.4"
hex = "0.4"
sha2 = "0.10"
tempfile = "3"
zstd = "0.13"
flate2 = "1.0"

[build-dependencies]
prost-build = "0.12"
tonic-build = "0.11"
protoc-bin-vendored = "3"
