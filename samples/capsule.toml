schema_version = "1.0"
name = "test-hello-world"
version = "0.1.0"
type = "app"

[metadata]
description = "Simple test capsule for CLI implementation"
author = "Test User"

[execution]
runtime = "source"
entrypoint = "main.py"

[requirements]
min_memory = "128MB"
min_cpu = 0.1

[storage]
workspace = "1GB"

[routing]
weight = "light"
prefer_local = true

[targets]
preference = ["source"]

[targets.source]
language = "python"
version = "^3.11"
entrypoint = "main.py"
dependencies = "requirements.txt"
dev_mode = true  # Allow unsandboxed execution in dev mode
