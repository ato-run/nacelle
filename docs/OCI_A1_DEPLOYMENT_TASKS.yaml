# ============================================================
# リスクと対策
# ============================================================

risks_and_mitigations:
  - risk: "ARM64特有のビルドエラー"
    severity: "high"
    mitigation: "事前に小規模なテストビルドを実施。必要に応じてクロスコンパイルを検討"
    
  - risk: "youkiのARM64互換性問題"
    severity: "medium"
    mitigation: "youkiの代わりにruncをフォールバックオプションとして準備"
    
  - risk: "ネットワーク遅延（日本⇔OCI）"
    severity: "low"
    mitigation: "Tailscaleを使用して効率的なルーティングを確保"
    
  - risk: "OCI A1インスタンスのリソース不足"
    severity: "medium"
    mitigation: "最小要件（4GB RAM、2 vCPU）の確認。必要に応じてインスタンスサイズを拡大"
    
  - risk: "SSL証明書取得の失敗"
    severity: "low"
    mitigation: "自己署名証明書をフォールバックとして使用"

# ============================================================
# 推奨リソース
# ============================================================

recommended_resources:
  oci_instance:
    shape: "VM.Standard.A1.Flex"
    ocpus: "2-4"
    memory_gb: "8-16"
    boot_volume_gb: "100"
    os: "Ubuntu 22.04 LTS (ARM64)"
    
  network:
    ingress_ports:
      - "22 (SSH)"
      - "80 (HTTP)"
      - "443 (HTTPS)"
      - "Custom gRPC port (e.g., 50051)"
    egress: "Allow all"

# ============================================================
# 付録: 有用なコマンド集
# ============================================================

useful_commands:
  check_architecture: "uname -m"
  check_rust_version: "rustc --version"
  check_go_version: "go version"
  check_youki_version: "youki --version"
  check_service_status: "systemctl status capsuled-engine capsuled-client"
  view_logs: "journalctl -u capsuled-engine -f"
  check_listening_ports: "ss -tuln"
  check_firewall_status: "sudo ufw status verbose"
  test_api: "curl -H 'X-API-Key: YOUR_KEY' http://localhost:8080/health"
  check_disk_usage: "df -h"
  check_memory_usage: "free -h"

# ============================================================
# 参照ドキュメント
# ============================================================

reference_documents:
  - "README.md - プロジェクト概要とビルド手順"
  - "TODO.md - 全体の実装ロードマップ"
  - "engine/provisioning/scripts/deploy.py - デプロイスクリプトの実装"
  - "engine/provisioning/MIGRATION.md - プロビジョニング統合ガイド"
  - "docs/CI_CD.md - CI/CDパイプライン"
  - ".github/workflows/ci.yml - GitHub Actions設定"
