syntax = "proto3";
package onescluster.engine.v1;

option go_package = "github.com/onescluster/coordinator/pkg/proto;proto";

service Engine {
  rpc DeployCapsule(DeployRequest) returns (DeployResponse);
  rpc StopCapsule(StopRequest) returns (StopResponse);
  rpc GetResources(GetResourcesRequest) returns (ResourceInfo);
  rpc ValidateManifest(ValidateRequest) returns (ValidationResult);
}

message GetResourcesRequest {
  // 空のリクエストメッセージ
}

message DeployRequest {
  string capsule_id = 1;
  bytes adep_json = 2;
  string oci_image = 3;
  string digest = 4;
}

message DeployResponse {
  string capsule_id = 1;
  string status = 2;
}

message StopRequest {
  string capsule_id = 1;
}

message StopResponse {
  string capsule_id = 1;
  string status = 2;
}

message ResourceInfo {
  uint64 cpu_cores = 1;
  uint64 memory_bytes = 2;
  uint64 disk_bytes = 3;
}

message ValidateRequest {
  bytes adep_json = 1;
}

message ValidationResult {
  bool valid = 1;
  string error_message = 2;
}
