syntax = "proto3";
package nacelle.engine.v1;

option go_package = "github.com/capsuled-dev/nacelle/pkg/proto;proto";

import "common/v1/common.proto";

service Engine {
  rpc DeployCapsule(DeployRequest) returns (DeployResponse);
  rpc StopCapsule(StopRequest) returns (StopResponse);
  rpc GetResources(GetResourcesRequest) returns (ResourceInfo);
  rpc ValidateManifest(ValidateRequest) returns (ValidationResult);
  rpc GetSystemStatus(GetSystemStatusRequest) returns (SystemStatus);
  rpc StreamLogs(LogRequest) returns (stream EngineLogEntry);
  // Model prefetch/cache: download (if missing) to an allowlisted host path.
  rpc FetchModel(FetchModelRequest) returns (FetchModelResponse);
  // Get job execution status (Phase 3: Coordinator integration)
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
  // List recent jobs with optional filtering
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  // Cancel a running job (Phase 6: Control Plane completion)
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
}

message FetchModelRequest {
  // Logical identifier for the model (used for cache directory naming)
  string model_id = 1;
  // Source URL (HTTP/HTTPS)
  string url = 2;
  // Optional expected SHA-256 hex (lower/upper acceptable). Empty means "don't verify".
  string expected_sha256 = 3;
}

message FetchModelResponse {
  // Absolute local path to the cached file (host path)
  string local_path = 1;
  // True if the file was already present and re-used.
  bool cached = 2;
  // Bytes downloaded in this call (0 if cached).
  uint64 bytes_downloaded = 3;
}

message LogRequest {
  string capsule_id = 1;
  bool follow = 2; // If true, stream updates. If false, return current content and close.
  uint64 tail_lines = 3; // Number of lines to return from the end (0 for all/default)
}

message EngineLogEntry {
  string line = 1;
  string timestamp = 2; // ISO8601
  string source = 3; // "stdout" or "stderr"
}

message GetResourcesRequest {
  // Empty request message
}

message GetSystemStatusRequest {
  // Empty request message
}

message DeployRequest {
  string capsule_id = 1;
  oneof manifest {
    bytes adep_json = 2 [deprecated = true];      // Legacy JSON support
    string toml_content = 5 [deprecated = true];  // TOML manifest content
    nacelle.common.v1.RunPlan run_plan = 6;   // Normalized execution plan (protobuf)
    bytes capnp_manifest = 8;                     // Cap'n Proto SSOT manifest (preferred)
  }
  string oci_image = 3;  // Optional, can be derived from manifest
  string digest = 4;     // Optional
  bytes manifest_signature = 7; // Raw signature bytes (Ed25519)
}

message DeployResponse {
  string capsule_id = 1;
  string status = 2;
  string local_url = 3;  // e.g., "http://verification-capsule.local"
  repeated string failure_codes = 4;
  string failure_message = 5;
}

message StopRequest {
  string capsule_id = 1;
}

message StopResponse {
  string capsule_id = 1;
  string status = 2;
}

message ResourceInfo {
  uint64 cpu_cores = 1;
  uint64 memory_bytes = 2;
  uint64 disk_bytes = 3;
  string backend_mode = 4; // "cpu", "gpu", or "mock"
  string vpn_ip = 5;
  map<string, uint32> local_services = 6; // name -> port
}

message ValidateRequest {
  oneof manifest {
    bytes adep_json = 1 [deprecated = true];      // Legacy JSON support (deprecated)
    bytes capnp_manifest = 2;                     // Cap'n Proto SSOT manifest (preferred)
  }
}

message ValidationResult {
  bool valid = 1;
  string error_message = 2;
}

message SystemStatus {
  string backend_mode = 1;        // "cpu", "gpu", "mock"
  string vpn_ip = 2;              // Headscale IP
  repeated CapsuleInfo capsules = 3;
  ResourceUsage resources = 4;
}

message CapsuleInfo {
  string id = 1;
  string name = 2;
  string status = 3;             // "running", "stopped", "failed"
  string local_url = 4;          // e.g., "http://app.local"
  uint64 reserved_vram_bytes = 5;
  string last_failure = 6;       // empty if none
  int32 last_exit_code = 7;      // -1 if unknown
}

message ResourceUsage {
  uint64 cpu_cores_total = 1;
  uint64 cpu_cores_used = 2;
  uint64 memory_bytes_total = 3;
  uint64 memory_bytes_used = 4;
  uint64 vram_bytes_total = 5;
  uint64 vram_bytes_used = 6;
}

// Job Status API (Phase 3: Coordinator Integration)

message GetJobStatusRequest {
  string job_id = 1;  // Unique job identifier (typically capsule_id)
}

message GetJobStatusResponse {
  string job_id = 1;
  string capsule_name = 2;
  string capsule_version = 3;
  JobPhase phase = 4;
  string error_message = 5;      // Empty if no error
  int32 exit_code = 6;           // -1 if not applicable
  string created_at = 7;         // ISO8601
  string started_at = 8;         // ISO8601, empty if not started
  string finished_at = 9;        // ISO8601, empty if not finished
  uint64 duration_secs = 10;     // 0 if still running or not started
  JobResourceUsage resource_usage = 11;
}

enum JobPhase {
  JOB_PHASE_UNSPECIFIED = 0;
  JOB_PHASE_PENDING = 1;
  JOB_PHASE_RUNNING = 2;
  JOB_PHASE_SUCCEEDED = 3;
  JOB_PHASE_FAILED = 4;
  JOB_PHASE_CANCELLED = 5;
}

message JobResourceUsage {
  uint64 cpu_time_ms = 1;        // Total CPU time used
  uint64 memory_peak_bytes = 2;  // Peak memory usage
  uint64 vram_peak_bytes = 3;    // Peak VRAM usage (if GPU job)
}

message ListJobsRequest {
  uint32 limit = 1;              // Max jobs to return (default: 100)
  string capsule_name = 2;       // Filter by capsule name (optional)
  JobPhase phase_filter = 3;     // Filter by phase (optional, 0 = all)
}

message ListJobsResponse {
  repeated JobSummary jobs = 1;
}

message JobSummary {
  string job_id = 1;
  string capsule_name = 2;
  JobPhase phase = 3;
  string created_at = 4;         // ISO8601
  uint64 duration_secs = 5;      // 0 if still running
}

// CancelJob - Request to cancel a running job
message CancelJobRequest {
  string job_id = 1;             // Job ID to cancel
  bool force = 2;                // If true, send SIGKILL instead of SIGTERM
}

// CancelJob - Response after attempting cancellation
message CancelJobResponse {
  bool success = 1;              // True if cancellation was initiated
  string message = 2;            // Human-readable status message
  JobPhase previous_phase = 3;   // Phase before cancellation attempt
}

