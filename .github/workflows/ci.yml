name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  RUST_VERSION: "1.83"
  NODE_VERSION: "20"

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: client
          args: --timeout=5m

  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check
        working-directory: engine

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: engine

  test-coordinator:
    name: Test Coordinator
    runs-on: ubuntu-latest
    needs: lint-go
    services:
      rqlite:
        # NOTE: rqlite/rqlite does not publish a floating major tag "8".
        # Pin to a known-good released version to avoid Docker pull failures.
        image: rqlite/rqlite:9.3.5
        ports:
          - 4001:4001

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: client

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: client/coverage.out
          flags: coordinator

  test-engine:
    name: Test Engine
    runs-on: ubuntu-latest
    needs: lint-rust
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-features
        working-directory: engine

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    needs: [test-coordinator, test-engine]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build Coordinator
        run: go build -o coordinator ./cmd/coordinator
        working-directory: client

      - name: Build Engine
        run: cargo build --release
        working-directory: engine

      - name: Upload Coordinator
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-${{ matrix.os }}
          path: client/coordinator

      - name: Upload Engine
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.os }}
          path: engine/target/release/capsuled-engine

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
        working-directory: client
        continue-on-error: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cargo audit
        working-directory: engine
        continue-on-error: true
