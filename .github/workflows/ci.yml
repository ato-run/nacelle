name: CI

# Re-enabled: capsuled is now self-contained with Parent-Child workspace architecture
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protocol Buffers (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Protocol Buffers (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Protocol Buffers (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install protoc
          refreshenv

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build Workspace
        run: cargo build --workspace --verbose

      - name: Build CLI
        run: cargo build -p uarc-cli --verbose

      - name: Run unit tests
        run: cargo test --workspace --lib --bins --verbose

      - name: Run integration tests (non-ignored)
        run: cargo test --workspace --test '*' --verbose

  # Temporarily disabled: E2E tests run separately to reduce CI concurrency
  # source-runtime-e2e:
  #   name: Source Runtime E2E Tests
  #   runs-on: ${{ matrix.os }}
  #   ... (E2E test configuration)

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.21.2

      - name: Run security audit
        run: cargo audit

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protocol Buffers (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Protocol Buffers (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Protocol Buffers (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install protoc
          refreshenv

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: capsuled-${{ runner.os }}
          path: target/release/capsuled

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: capsuled-${{ runner.os }}
          path: target/release/capsuled.exe
