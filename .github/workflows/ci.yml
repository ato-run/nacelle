name: CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  # Rust - engine
  build-engine:
    name: Build engine
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-engine-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-engine-

      - name: Build engine (debug)
        working-directory: engine
        run: cargo build

      - name: Run engine unit tests
        working-directory: engine
        run: cargo test --lib

      - name: Build engine (release)
        working-directory: engine
        run: cargo build --release

      - name: Upload engine binary
        uses: actions/upload-artifact@v4
        with:
          name: capsuled-engine-linux-x86_64
          path: engine/target/release/capsuled-engine
          retention-days: 7

  # Go - client
  build-client:
    name: Build client (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          # Standard build
          - goos: linux
            goarch: amd64
            cgo: "1"
            name: linux-x86_64
          # CGO_ENABLED=0 build (static, also compatible with Alpine/musl)
          - goos: linux
            goarch: amd64
            cgo: "0"
            name: linux-x86_64-static
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: client/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Build client
        working-directory: client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          go build -o capsuled-client-${{ matrix.name }} ./cmd/client

      - name: Upload client binary
        uses: actions/upload-artifact@v4
        with:
          name: capsuled-client-${{ matrix.name }}
          path: client/capsuled-client-${{ matrix.name }}
          retention-days: 7

  # Go tests
  test-client:
    name: Test client (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: client/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        working-directory: client
        run: go mod download

      - name: Run unit tests
        working-directory: client
        run: go test -v -cover ./pkg/...

      # - name: Run GPU simulation E2E test (excludes tests requiring Rust compilation)
      #   working-directory: client
      #   run: go test -v ./e2e -run TestGpuSimulationE2E

      - name: Generate coverage report
        working-directory: client
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./pkg/...
          echo "## Go Test Coverage" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep total: >> $GITHUB_STEP_SUMMARY

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
            name: go-coverage
            path: client/coverage.out
            retention-days: 7

  # Full integration test
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build-engine, build-client]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: client/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install buf
        id: install-buf
        run: |
          BUF_VERSION=1.28.1
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-$(uname -s)-$(uname -m)" -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf
        continue-on-error: true

      - name: Check buf installation
        if: steps.install-buf.outcome == 'failure'
        run: echo "Warning - buf installation failed, proto generation will be skipped"

      - name: Build Engine (release)
        working-directory: engine
        run: |
          cargo build --release
          mkdir -p ../bin
          cp target/release/capsuled-engine ../bin/

      - name: Build Client
        working-directory: client
        run: |
          mkdir -p ../bin
          go build -o ../bin/capsuled-client ./cmd/client

      - name: Verify artifacts exist
        run: |
          ls -lh bin/
          echo "✅ All artifacts built successfully"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      [
        build-engine,
        build-client,
        test-client,
        integration-test,
      ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/capsuled-engine-linux-x86_64/capsuled-engine
            artifacts/capsuled-client-linux-x86_64/capsuled-client-linux-x86_64
            artifacts/capsuled-client-linux-x86_64-static/capsuled-client-linux-x86_64-static
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
