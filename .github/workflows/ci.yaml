name: Capsuled CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          git clone --depth 1 https://github.com/Koh0920/uarc.git ../uarc

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --lib --bins -- -D warnings

  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          git clone --depth 1 https://github.com/Koh0920/uarc.git ../uarc

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run unit tests
        run: cargo test --workspace --lib

  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          git clone --depth 1 https://github.com/Koh0920/uarc.git ../uarc

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: |
          cargo build --release --bin capsuled -p capsuled
          cargo build --release --bin capsule -p capsule-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capsuled-${{ matrix.os }}
          path: |
            target/release/capsuled
            target/release/capsule
          if-no-files-found: error

  e2e:
    name: E2E Tests
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          git clone --depth 1 https://github.com/Koh0920/uarc.git ../uarc

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: |
          cargo build --release --bin capsuled -p capsuled
          cargo build --release --bin capsule -p capsule-cli

      - name: Setup test environment
        run: |
          mkdir -p ~/.capsule/keys
          mkdir -p ~/.capsule/cas/blobs

      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e-test.sh
          ./scripts/e2e-test.sh
        env:
          CAPSULED_ALLOW_DEV_MODE: "1"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: /tmp/capsuled-e2e-*/

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
        continue-on-error: true

  ci-success:
    name: CI Success
    needs: [lint, test, build, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.e2e.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
