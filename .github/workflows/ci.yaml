name: Capsuled CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          rm -rf ../uarc
          git clone --depth 1 https://github.com/OnesCluster/uarc.git ../uarc

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --lib --bins -- -D warnings

  test:
    name: Unit Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          rm -rf ../uarc
          git clone --depth 1 https://github.com/OnesCluster/uarc.git ../uarc

      - name: Run unit tests
        run: cargo test --workspace --lib

  build:
    name: Build Release
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          rm -rf ../uarc
          git clone --depth 1 https://github.com/OnesCluster/uarc.git ../uarc

      - name: Build release binaries
        run: |
          cargo build --release --bin capsuled -p capsuled
          cargo build --release --bin capsule -p capsule-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capsuled-macos-arm64
          path: |
            target/release/capsuled
            target/release/capsule
          if-no-files-found: error

  e2e:
    name: E2E Tests
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Clone UARC proto definitions
        run: |
          rm -rf ../uarc
          git clone --depth 1 https://github.com/OnesCluster/uarc.git ../uarc

      - name: Build release binaries
        run: |
          cargo build --release --bin capsuled -p capsuled
          cargo build --release --bin capsule -p capsule-cli

      - name: Setup test environment
        run: |
          mkdir -p ~/.capsule/keys
          mkdir -p ~/.capsule/cas/blobs

      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e-test.sh
          ./scripts/e2e-test.sh
        env:
          CAPSULED_ALLOW_DEV_MODE: "1"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: /tmp/capsuled-e2e-*/

  security-scan:
    name: Security Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run security audit
        run: cargo audit || true  # Don't fail on advisory, just warn

  # Final status check for branch protection
  ci-success:
    name: CI Success
    needs: [lint, test, build, e2e]
    runs-on: self-hosted
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.e2e.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
