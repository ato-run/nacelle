name: Quick Check

on:
  push:
    branches-ignore: [main, origin]
  pull_request:
    branches: [main, origin]

env:
  CARGO_TERM_COLOR: always

jobs:
  quick-check:
    name: Quick Check (fmt + clippy + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone UARC repository
        run: |
          cd ..
          git clone https://github.com/koh0920/uarc.git

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-quick-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protocol Buffers
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler capnproto

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run quick tests
        run: cargo test --lib --bins --verbose
