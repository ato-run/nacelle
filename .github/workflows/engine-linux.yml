name: Engine Linux Build

on:
    push:
        branches: [main, develop]
        paths:
            - "engine/**"
            - "libadep/**"
            - ".github/workflows/engine-linux.yml"
    pull_request:
        branches: [main]
        paths:
            - "engine/**"
            - "libadep/**"

env:
    RUST_VERSION: "1.83"
    CARGO_TERM_COLOR: always

jobs:
    # ============================================
    # Linux Build & Test
    # ============================================
    build-linux:
        name: Build Linux (x86_64)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_VERSION }}
                  targets: x86_64-unknown-linux-gnu
                  components: clippy, rustfmt

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      engine/target
                  key: ${{ runner.os }}-cargo-engine-${{ hashFiles('engine/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-engine-

            - name: Install rustfmt
              run: rustup component add rustfmt

            - name: Check formatting
              run: cargo fmt --check
              working-directory: engine

            - name: Clippy
              run: cargo clippy --all-targets --all-features -- -D warnings
              working-directory: engine

            - name: Build release
              run: cargo build --release --bin capsuled-engine
              working-directory: engine

            - name: Run tests
              run: cargo test --release
              working-directory: engine

            - name: Upload binary
              uses: actions/upload-artifact@v4
              with:
                  name: capsuled-engine-linux-x86_64
                  path: engine/target/release/capsuled-engine
                  retention-days: 7

    # ============================================
    # Docker Build
    # ============================================
    docker-build:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: build-linux

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image (CPU)
              uses: docker/build-push-action@v5
              with:
                  context: ./engine
                  file: ./engine/Dockerfile
                  push: false
                  tags: capsuled-engine:test
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Test Docker image
              run: |
                  docker run -d --name test-engine -p 4500:4500 capsuled-engine:test
                  sleep 5
                  curl -f http://localhost:4500/health || exit 1
                  docker stop test-engine
                  docker rm test-engine

    # ============================================
    # Docker Push (main branch only)
    # ============================================
    docker-push:
        name: Docker Push
        runs-on: ubuntu-latest
        needs: docker-build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/capsuled-engine
                  tags: |
                      type=raw,value=latest
                      type=sha,prefix=
                      type=ref,event=branch

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./engine
                  file: ./engine/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ============================================
    # Integration Test (with Docker Compose)
    # ============================================
    integration-test:
        name: Integration Test
        runs-on: ubuntu-latest
        needs: docker-build

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Compose
              run: |
                  docker compose version

            - name: Start services
              run: |
                  docker compose -f docker-compose.cloud.yml up -d engine
              working-directory: engine

            - name: Wait for health
              run: |
                  for i in {1..30}; do
                    if curl -sf http://localhost:4500/health; then
                      echo "Engine is healthy"
                      exit 0
                    fi
                    echo "Waiting for engine... ($i/30)"
                    sleep 2
                  done
                  echo "Engine failed to start"
                  docker compose -f docker-compose.cloud.yml logs engine
                  exit 1
              working-directory: engine

            - name: Run API tests
              run: |
                  # Basic health check
                  curl -sf http://localhost:4500/health | jq .

                  # List capsules (should be empty initially)
                  curl -sf http://localhost:4500/capsules | jq .

            - name: Cleanup
              if: always()
              run: |
                  docker compose -f docker-compose.cloud.yml down -v
              working-directory: engine
