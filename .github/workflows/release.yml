name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.23'
  RUST_VERSION: '1.75'
  NODE_VERSION: '20'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Simple changelog from git log
          echo "## Changes" > CHANGELOG.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Gumball ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}

  build-and-upload:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            name: darwin-arm64
            target: aarch64-apple-darwin
          - os: macos-13
            name: darwin-x86_64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Build Coordinator
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ needs.create-release.outputs.version }}" \
            -o coordinator ./cmd/coordinator
        working-directory: client

      - name: Build capsule-cli
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ needs.create-release.outputs.version }}" \
            -o capsule-cli ./cmd/capsule-cli
        working-directory: client

      - name: Build Edge Router
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ needs.create-release.outputs.version }}" \
            -o edge-router ./cmd/edge-router
        working-directory: client

      - name: Build Engine
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: engine

      - name: Package
        run: |
          mkdir -p dist
          cp client/coordinator dist/
          cp client/capsule-cli dist/
          cp client/edge-router dist/
          cp engine/target/${{ matrix.target }}/release/capsuled-engine dist/
          tar -czvf gumball-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz -C dist .

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./gumball-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz
          asset_name: gumball-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz
          asset_content_type: application/gzip

  # ========================================
  # Docker Images Build & Push
  # ========================================
  build-docker-images:
    name: Docker ${{ matrix.component }}
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: engine
            context: .
            dockerfile: engine/Dockerfile
          - component: coordinator
            context: client
            dockerfile: Dockerfile
          - component: web
            context: ../gumball-cloud/web
            dockerfile: Dockerfile
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/onescluster/gumball-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
