#cloud-config
package_update: true
package_upgrade: true

packages:
  - python3
  - python3-pip
  - git

runcmd:
  - git clone https://github.com/your-org/rig-manager.git /tmp/rig-manager
  - cd /tmp/rig-manager
  - pip3 install -r provisioning/scripts/requirements.txt
  - python3 provisioning/scripts/deploy.py
