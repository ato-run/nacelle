# Gumball - Production Deployment
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# For end users who want to run Gumball without building from source.
# All images are pre-built and pulled from GitHub Container Registry.

# NOTE: Image names must match what CI publishes in .github/workflows/build-push.yml.
# If you rename images/tags there, update this file at the same time.

version: "3.8"

services:
  # ========================================
  # rqlite - Distributed SQLite for state
  # ========================================
  rqlite:
    image: rqlite/rqlite:${RQLITE_VERSION:-latest}
    container_name: gumball-rqlite
    command:
      - "-http-addr"
      - "0.0.0.0:4001"
      - "-raft-addr"
      - "0.0.0.0:4002"
    ports:
      - "4001:4001"
      - "4002:4002"
    volumes:
      - rqlite_data:/rqlite/file
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ========================================
  # Caddy - Reverse Proxy (Gateway)
  # ========================================
  caddy:
    image: caddy:2-alpine
    container_name: gumball-caddy
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./client/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ========================================
  # Engine - Capsule Runtime (Privileged)
  # ========================================
  engine:
    image: ghcr.io/onescluster/gumball-engine:${VERSION:-latest}
    container_name: gumball-engine
    ports:
      - "50051:50051"
      - "4500:4500"
      - "4501:4501"
    privileged: true
    volumes:
      - gumball_data:/var/lib/gumball
      - /var/run/docker.sock:/var/run/docker.sock
      - engine_tmp:/tmp/capsuled
    environment:
      - RUST_LOG=info
      - FORCE_DOCKER_CLI_RUNTIME=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4500/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ========================================
  # Coordinator - Orchestration Brain
  # ========================================
  coordinator:
    image: ghcr.io/onescluster/gumball-coordinator:${VERSION:-latest}
    container_name: gumball-coordinator
    ports:
      - "50050:50050"
      - "8081:8081"
    volumes:
      - coordinator_data:/app/data
    environment:
      - CADDY_ADMIN_URL=http://caddy:2019
      - GUMBALL_DOMAIN_SUFFIX=${DOMAIN_SUFFIX:-localhost}
      - ENGINE_ADDRESS=engine:50051
      - CADDY_UPSTREAM_HOST=host.docker.internal
      - GUMBALL_DB_PATH=/app/data/gumball.db
      - RQLITE_ADDR=http://rqlite:4001
    depends_on:
      caddy:
        condition: service_healthy
      engine:
        condition: service_started
      rqlite:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ========================================
  # Web UI - Next.js Frontend
  # ========================================
  web:
    image: ghcr.io/onescluster/gumball-web:${VERSION:-latest}
    container_name: gumball-web
    ports:
      - "3000:3000"
    environment:
      - COORDINATOR_ADDRESS=coordinator:50050
      - ENGINE_ADDRESS=engine:50051
      - NODE_ENV=production
    depends_on:
      coordinator:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  gumball_data:
  engine_tmp:
  coordinator_data:
  rqlite_data:
